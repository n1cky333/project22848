<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>La Maison — Администратор</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#c9a84c;--d:#0d1117;--d2:#161b22;--d3:#1c2333;
  --b:rgba(201,168,76,.22);--t:#e6edf3;--t2:#8b949e}
body{background:var(--d);color:var(--t);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:var(--d2);border:1px solid var(--b);border-radius:14px;
  padding:40px 36px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:18px}
.llogo{color:var(--g);font-size:24px;font-style:italic;text-align:center;
  font-family:Georgia,serif;letter-spacing:2px}
.lsub{text-align:center;color:var(--t2);font-size:14px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;color:var(--g);letter-spacing:1.5px;text-transform:uppercase}
.fld input{width:100%;background:var(--d3);border:1px solid var(--b);color:var(--t);
  padding:12px 14px;border-radius:7px;font-size:16px;font-family:inherit;
  transition:.2s;-webkit-appearance:none}
.fld input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.btn-login{width:100%;padding:13px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--g),#9a7228);color:#0d1117;
  font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:.2s}
.btn-login:hover{filter:brightness(1.1)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.lerr{padding:11px 14px;border-radius:7px;font-size:13px;text-align:center;
  background:rgba(220,38,38,.1);border:1px solid #dc2626;color:#f87171;display:none}

/* PANEL */
#panel{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--d2);border-bottom:1px solid var(--b);padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.topbar-logo{color:var(--g);font-size:18px;font-style:italic;font-family:Georgia,serif}
.btn-out{background:transparent;border:1px solid var(--b);color:var(--t2);
  padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;
  font-family:inherit;transition:.2s}
.btn-out:hover{border-color:#dc2626;color:#dc2626}
.layout{display:flex;flex:1}
.sidebar{width:188px;flex-shrink:0;background:var(--d2);
  border-right:1px solid var(--b);display:flex;flex-direction:column;padding:14px 0}
.sb-btn{padding:11px 20px;background:none;border:none;border-right:2px solid transparent;
  color:var(--t2);cursor:pointer;font-size:13px;text-align:left;
  transition:.2s;font-family:inherit;white-space:nowrap}
.sb-btn:hover{color:var(--t);background:rgba(255,255,255,.03)}
.sb-btn.act{color:var(--g);border-right-color:var(--g);background:rgba(201,168,76,.06)}
.main{flex:1;padding:24px 16px;overflow:auto;padding-bottom:80px}
@media(min-width:641px){.main{padding-bottom:24px}}
.view{display:none}.view.act{display:block}
.vtitle{font-size:20px;color:var(--g);margin-bottom:20px;font-family:Georgia,serif}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--d2);border:1px solid var(--b);border-radius:10px;
  padding:16px 12px;text-align:center;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc:nth-child(1)::before{background:var(--g)}.sc:nth-child(2)::before{background:#3b82f6}
.sc:nth-child(3)::before{background:#f59e0b}.sc:nth-child(4)::before{background:#22c55e}
.sc:nth-child(5)::before{background:#a855f7}
.sc-v{font-size:32px;font-weight:700;margin:4px 0 6px;line-height:1}
.sc:nth-child(1) .sc-v{color:var(--g)}.sc:nth-child(2) .sc-v{color:#60a5fa}
.sc:nth-child(3) .sc-v{color:#fbbf24}.sc:nth-child(4) .sc-v{color:#4ade80}
.sc:nth-child(5) .sc-v{color:#c084fc}
.sc-l{font-size:11px;color:var(--t2);line-height:1.4}

/* FILTERS */
.vhead{margin-bottom:16px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.fi{background:var(--d2);border:1px solid var(--b);color:var(--t);
  padding:9px 11px;border-radius:6px;font-size:14px;font-family:inherit;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--g)}
.btn-sm{padding:9px 16px;border-radius:6px;border:1px solid var(--b);
  background:transparent;color:var(--t2);font-size:13px;cursor:pointer;
  font-family:inherit;transition:.2s}
.btn-sm:hover{border-color:var(--g);color:var(--g)}

/* TABLE */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:740px}
th{background:#0d1e35;color:#93c5fd;padding:11px 10px;text-align:left;
  font-weight:600;border-bottom:1px solid #1e3a5f;white-space:nowrap}
td{padding:10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.empty-td{text-align:center;color:var(--t2);padding:36px!important}
.badge{display:inline-block;padding:3px 9px;border-radius:10px;
  font-size:11px;font-weight:600;white-space:nowrap}
.ssel{background:var(--d2);border:1px solid var(--b);color:var(--t);
  padding:5px 8px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit}
.ssel:focus{outline:none;border-color:var(--g)}
.btn-del{background:transparent;border:1px solid #dc2626;color:#dc2626;
  padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;
  font-family:inherit;transition:.2s;margin-left:6px}
.btn-del:hover{background:rgba(220,38,38,.12)}

/* MOBILE CARDS */
.cards{display:none;flex-direction:column;gap:10px}
@media(max-width:640px){
  .twrap{display:none}.cards{display:flex}
  .sidebar{display:none}.botnav{display:flex}
}
.card{background:var(--d2);border:1px solid var(--b);border-radius:8px;padding:14px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:10px;gap:8px}
.card-name{font-weight:600;font-size:15px}
.card-row{font-size:13px;color:var(--t2);margin-bottom:4px;line-height:1.5}
.card-row b{color:var(--t)}
.card-acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.card-sel{flex:1;background:var(--d3);border:1px solid var(--b);
  color:var(--t);padding:9px;border-radius:6px;font-size:13px;font-family:inherit}
.card-del{background:transparent;border:1px solid #dc2626;color:#dc2626;
  padding:9px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}

/* BOTTOM NAV */
.botnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--d2);border-top:1px solid var(--b);
  padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.botnav button{flex:1;background:none;border:none;color:var(--t2);
  font-size:11px;padding:6px 4px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.botnav button span{font-size:20px}
.botnav button.act{color:var(--g)}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="llogo">✦ La Maison</div>
    <div class="lsub">Вход для сотрудников</div>
    <div class="fld"><label>Логин</label>
      <input type="text" id="l-login" value="admin" autocomplete="username"/></div>
    <div class="fld"><label>Пароль</label>
      <input type="password" id="l-pass" autocomplete="current-password"/></div>
    <button class="btn-login" id="btn-login">Войти</button>
    <div class="lerr" id="l-err"></div>
  </div>
</div>

<div id="panel">
  <div class="topbar">
    <div class="topbar-logo">✦ La Maison</div>
    <button class="btn-out" id="btn-logout">Выйти</button>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <button class="sb-btn act" data-v="dash">📊 Дашборд</button>
      <button class="sb-btn" data-v="res">📋 Бронирования</button>
    </aside>
    <main class="main">
      <div class="view act" id="v-dash">
        <div class="vtitle">Дашборд</div>
        <div class="stats">
          <div class="sc"><div class="sc-v" id="s-total">—</div><div class="sc-l">Активных броней</div></div>
          <div class="sc"><div class="sc-v" id="s-today">—</div><div class="sc-l">Сегодня</div></div>
          <div class="sc"><div class="sc-v" id="s-pend">—</div><div class="sc-l">Ожидают</div></div>
          <div class="sc"><div class="sc-v" id="s-cust">—</div><div class="sc-l">Клиентов</div></div>
          <div class="sc"><div class="sc-v" id="s-zones">—</div><div class="sc-l">Зон зала</div></div>
        </div>
      </div>
      <div class="view" id="v-res">
        <div class="vhead">
          <div class="vtitle" style="margin:0">Бронирования</div>
          <div class="filters">
            <input type="date" id="f-date" class="fi"/>
            <select id="f-status" class="fi">
              <option value="">Все статусы</option>
              <option value="pending">Ожидает</option>
              <option value="confirmed">Подтверждено</option>
              <option value="completed">Завершено</option>
              <option value="cancelled">Отменено</option>
            </select>
            <button class="btn-sm" onclick="loadRes()">Применить</button>
            <button class="btn-sm" onclick="resetF()">Сбросить</button>
          </div>
        </div>
        <div class="twrap">
          <table>
            <thead><tr>
              <th>#</th><th>Дата / Время</th><th>Клиент</th><th>Телефон</th>
              <th>Стол</th><th>Гостей</th><th>Пожелания</th><th>Статус</th><th>Действия</th>
            </tr></thead>
            <tbody id="tbody"><tr><td colspan="9" class="empty-td">Загрузка…</td></tr></tbody>
          </table>
        </div>
        <div class="cards" id="cards">
          <div style="text-align:center;color:var(--t2);padding:20px">Загрузка…</div>
        </div>
      </div>
    </main>
  </div>
  <nav class="botnav">
    <button data-v="dash" class="act"><span>📊</span>Дашборд</button>
    <button data-v="res"><span>📋</span>Брони</button>
  </nav>
</div>

<script src="config.js"></script>
<script>
if(typeof API_URL==='undefined') var API_URL='';
var TK='lm_token';
function gt(){return sessionStorage.getItem(TK)||'';}
function st(t){sessionStorage.setItem(TK,t);}
function ct(){sessionStorage.removeItem(TK);}

function req(p,o){
  var h=Object.assign({'Content-Type':'application/json'},(o&&o.headers)||{});
  var tk=gt();if(tk) h['X-Admin-Token']=tk;
  return fetch(API_URL+p,Object.assign({},o||{},{headers:h})).then(function(r){return r.json();});
}

if(gt()){
  req('/api/admin/check').then(function(d){
    if(d.success) showPanel(); else{ct();showLogin();}
  }).catch(showLogin);
} else showLogin();

function showLogin(){
  document.getElementById('login').style.display='flex';
  document.getElementById('panel').style.display='none';
}
function showPanel(){
  document.getElementById('login').style.display='none';
  document.getElementById('panel').style.display='flex';
  document.getElementById('panel').style.flexDirection='column';
  loadStats();
}

document.getElementById('l-pass').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('btn-login').click();
});
document.getElementById('btn-login').addEventListener('click',function(){
  var btn=this,err=document.getElementById('l-err');
  err.style.display='none'; btn.disabled=true; btn.textContent='Вход…';
  req('/api/admin/login',{method:'POST',body:JSON.stringify({
    login:document.getElementById('l-login').value.trim(),
    password:document.getElementById('l-pass').value
  })}).then(function(d){
    btn.disabled=false; btn.textContent='Войти';
    if(d.success){st(d.token);showPanel();}
    else{err.textContent=d.message||'Ошибка входа';err.style.display='block';}
  }).catch(function(){
    btn.disabled=false; btn.textContent='Войти';
    err.textContent='Сетевая ошибка'; err.style.display='block';
  });
});

document.getElementById('btn-logout').addEventListener('click',function(){
  req('/api/admin/logout',{method:'POST'}).catch(function(){});
  ct(); showLogin();
});

function switchView(v){
  document.querySelectorAll('.sb-btn,.botnav button').forEach(function(b){
    b.classList.toggle('act',b.dataset.v===v);
  });
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('act');});
  var el=document.getElementById('v-'+v); if(el) el.classList.add('act');
  if(v==='dash') loadStats();
  if(v==='res')  loadRes();
}
document.querySelectorAll('.sb-btn,.botnav button').forEach(function(btn){
  btn.addEventListener('click',function(){switchView(btn.dataset.v);});
});

function loadStats(){
  req('/api/admin/stats').then(function(d){
    if(!d.success) return;
    var s=d.stats;
    document.getElementById('s-total').textContent=s.total;
    document.getElementById('s-today').textContent=s.today;
    document.getElementById('s-pend').textContent=s.pending;
    document.getElementById('s-cust').textContent=s.customers;
    document.getElementById('s-zones').textContent=s.zones;
  }).catch(function(){});
}

function loadRes(){
  var date=document.getElementById('f-date').value;
  var status=document.getElementById('f-status').value;
  var q=''; if(date) q+='date='+date+'&'; if(status) q+='status='+status+'&';
  if(q) q='?'+q.slice(0,-1);
  setTbody('<tr><td colspan="9" class="empty-td">Загрузка…</td></tr>');
  setCards('<div style="text-align:center;color:var(--t2);padding:20px">Загрузка…</div>');
  req('/api/admin/reservations'+q).then(function(d){
    if(!d.success||!d.reservations||!d.reservations.length){
      setTbody('<tr><td colspan="9" class="empty-td">Бронирований не найдено</td></tr>');
      setCards('<div style="text-align:center;color:var(--t2);padding:20px">Бронирований не найдено</div>');
      return;
    }
    renderTable(d.reservations);
    renderCards(d.reservations);
  }).catch(function(){
    setTbody('<tr><td colspan="9" class="empty-td">Ошибка загрузки</td></tr>');
  });
}

function setTbody(h){document.getElementById('tbody').innerHTML=h;}
function setCards(h){document.getElementById('cards').innerHTML=h;}

function renderTable(rows){
  setTbody(rows.map(function(r){
    var dt=fd(r.reservation_date),tm=ft(r.reservation_time);
    var bs=bs_(r.badge_color);
    return '<tr>'+
      '<td>'+r.reservation_id+'</td>'+
      '<td>'+dt+'<br><span style="color:var(--t2);font-size:11px">'+tm+'</span></td>'+
      '<td>'+esc(r.full_name)+'<br><span style="color:var(--t2);font-size:11px">'+esc(r.email)+'</span></td>'+
      '<td>'+esc(r.phone)+'</td>'+
      '<td>№'+r.table_number+' · '+esc(r.zone_name)+'</td>'+
      '<td>'+r.guests_count+'</td>'+
      '<td style="max-width:130px;word-break:break-word">'+(r.special_requests?esc(r.special_requests):'—')+'</td>'+
      '<td><span class="badge" style="'+bs+'">'+esc(r.status_name)+'</span></td>'+
      '<td style="white-space:nowrap">'+
        '<select class="ssel" onchange="chStatus(this,'+r.reservation_id+')">'+sOpts(r.status_code)+'</select>'+
        '<button class="btn-del" onclick="delRes('+r.reservation_id+',this)">✕</button>'+
      '</td>'+
    '</tr>';
  }).join(''));
}

function renderCards(rows){
  setCards(rows.map(function(r){
    var dt=fd(r.reservation_date),tm=ft(r.reservation_time);
    var bs=bs_(r.badge_color);
    return '<div class="card">'+
      '<div class="card-head">'+
        '<div class="card-name">'+esc(r.full_name)+'</div>'+
        '<span class="badge" style="'+bs+'">'+esc(r.status_name)+'</span>'+
      '</div>'+
      '<div class="card-row">📅 <b>'+dt+' '+tm+'</b></div>'+
      '<div class="card-row">🪑 Стол №'+r.table_number+' · '+esc(r.zone_name)+' · '+r.guests_count+' гост.</div>'+
      '<div class="card-row">📞 '+esc(r.phone)+'</div>'+
      '<div class="card-row">✉️ '+esc(r.email)+'</div>'+
      (r.special_requests?'<div class="card-row">💬 '+esc(r.special_requests)+'</div>':'')+
      '<div class="card-acts">'+
        '<select class="card-sel" onchange="chStatus(this,'+r.reservation_id+')">'+sOpts(r.status_code)+'</select>'+
        '<button class="card-del" onclick="delRes('+r.reservation_id+',this)">Удалить</button>'+
      '</div>'+
    '</div>';
  }).join(''));
}

function sOpts(cur){
  return [['pending','Ожидает'],['confirmed','Подтверждено'],['completed','Завершено'],['cancelled','Отменено']]
    .map(function(o){return '<option value="'+o[0]+'"'+(o[0]===cur?' selected':'')+'>'+o[1]+'</option>';})
    .join('');
}

function chStatus(sel,id){
  req('/api/admin/reservations/'+id+'/status',
    {method:'PATCH',body:JSON.stringify({status:sel.value})})
  .then(function(d){if(!d.success){alert('Ошибка');loadRes();}})
  .catch(function(){alert('Сетевая ошибка');loadRes();});
}

function delRes(id,btn){
  if(!confirm('Удалить бронирование №'+id+'?')) return;
  btn.disabled=true;
  req('/api/admin/reservations/'+id,{method:'DELETE'}).then(function(d){
    if(d.success){loadRes();loadStats();}
    else{alert('Ошибка');btn.disabled=false;}
  });
}

function resetF(){
  document.getElementById('f-date').value='';
  document.getElementById('f-status').value='';
  loadRes();
}

function fd(s){
  if(!s) return '—';
  var d=String(s).split('T')[0].split('-');
  return d.length===3?d[2]+'.'+d[1]+'.'+d[0]:s;
}
function ft(s){return s?String(s).slice(0,5):'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function h2r(h,a){
  if(!h||h.length<7) return 'rgba(255,255,255,'+a+')';
  return 'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')';
}
function bs_(c){return 'background:'+h2r(c,.15)+';color:'+c+';border:1px solid '+h2r(c,.4);}
</script>
</body>
</html>
